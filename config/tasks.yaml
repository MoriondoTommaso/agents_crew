planning_task:
  description: >
    Analyze the following requirement: {user_request}.
    Create a detailed technical design including class structures,
    method signatures, data models, and step-by-step logic flow.
    Be explicit enough that a developer can implement without ambiguity.
  expected_output: >
    A comprehensive technical design document in Markdown format,
    including: overview, component breakdown, API contracts, and
    pseudocode for non-trivial logic.
  agent: senior_architect

coding_task:
  description: >
    Using the technical design provided, implement the full solution in {language}.
    Ensure the code is modular, includes docstrings, and handles edge cases.
  expected_output: >
    The complete, executable source code with inline documentation.
  agent: senior_developer
