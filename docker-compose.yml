# docker-compose.yml
# Full coding agent stack:
#
#   coding-agency  — FastAPI SML router (plan → code), port 8000
#   memory         — Graphiti knowledge-graph MCP service, port 8002
#   neo4j          — Graph database backend for Graphiti, ports 7474 7687
#   openclaw       — agentic harness (CLI, interactive terminal)
#
# Prerequisites (on the HOST machine, before make up):
#   - ollama serve          (Ollama running on port 11434)
#   - FreeLLM API running   (default port 3001)
#
# Usage:
#   make up           → build + start all services
#   make bootstrap    → seed knowledge graph from codebase (run once)
#   make agent        → attach to the openclaw CLI
#   make logs         → follow all logs
#   make down         → stop everything
#   make check-deps   → verify Ollama + FreeLLM reachable before starting

services:

  # ── 1. Coding Agency server ───────────────────────────────────────────────
  coding-agency:
    build:
      context: .
      dockerfile: Dockerfile
    image: coding-agency:latest
    container_name: coding-agency
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL:   ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      FREELLM_BASE_URL:  ${FREELLM_BASE_URL:-http://host.docker.internal:3001/v1}
      FREELLMAPI_KEY:    ${FREELLMAPI_KEY:-none}
      PIPELINE_MODE:     ${PIPELINE_MODE:-hybrid}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── 2. Neo4j graph database ────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-changeme}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── 3. Graphiti Memory MCP service ────────────────────────────────────────
  memory:
    build:
      context: ./memory
      dockerfile: Dockerfile
    image: memory-mcp:latest
    container_name: memory
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      NEO4J_URI:             bolt://neo4j:7687
      NEO4J_USER:            neo4j
      NEO4J_PASSWORD:        ${NEO4J_PASSWORD:-changeme}
      OPENAI_API_KEY:        ${OPENAI_API_KEY:-}
      GRAPHITI_EMBED_MODEL:  ${GRAPHITI_EMBED_MODEL:-text-embedding-3-small}
      GRAPHITI_LLM_MODEL:    ${GRAPHITI_LLM_MODEL:-gpt-4o-mini}
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 4. Open-Claw harness ──────────────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    stdin_open: true
    tty: true
    depends_on:
      coding-agency:
        condition: service_healthy
      memory:
        condition: service_healthy
    volumes:
      - ./openclaw/openclaw.json:/root/.openclaw/openclaw.json:ro
      - ./openclaw/system-prompt.md:/root/.openclaw/system-prompt.md:ro
      - openclaw-data:/root/.openclaw/data
      - .:/workspace
    working_dir: /workspace
    environment:
      OPENCLAW_API_BASE: http://coding-agency:8000/v1
      OPENCLAW_MODEL:    coding-agency
      GITHUB_TOKEN:      ${GITHUB_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  openclaw-data:
  neo4j-data:
  neo4j-logs:
