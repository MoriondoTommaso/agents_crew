# docker-compose.yml
# Full coding agent stack:
#
#   coding-agency  — FastAPI SML router (plan → code), port 8000
#   mcp-server     — MCP tool server (filesystem + GitHub), port 8001
#   openclaw       — agentic harness (CLI, interactive terminal)
#
# Ollama stays on the host — reached via host.docker.internal.
#
# Usage:
#   make up        → build + start all services
#   make agent     → attach to the openclaw CLI
#   make logs      → follow all logs
#   make down      → stop everything

services:

  # ── 1. Coding Agency server ───────────────────────────────────────────────
  coding-agency:
    build:
      context: .
      dockerfile: Dockerfile
    image: coding-agency:latest
    container_name: coding-agency
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── 2. MCP tool server ────────────────────────────────────────────────────
  mcp-server:
    build:
      context: ./mcp
      dockerfile: Dockerfile
    image: mcp-server:latest
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      WORKSPACE_ROOT: /workspace
      GITHUB_TOKEN:   ${GITHUB_TOKEN:-}
      GITHUB_OWNER:   ${GITHUB_OWNER:-}
      GITHUB_REPO:    ${GITHUB_REPO:-}
    volumes:
      # Mount project root as /workspace (read-write)
      - .:/workspace
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── 3. Open-Claw harness ──────────────────────────────────────────────────
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    stdin_open: true
    tty: true
    depends_on:
      coding-agency:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    volumes:
      # Pre-built config (model list + MCP server reference)
      - ./openclaw/openclaw.json:/root/.openclaw/openclaw.json:ro
      # System prompt override
      - ./openclaw/system-prompt.md:/root/.openclaw/system-prompt.md:ro
      # Persist Open-Claw session data across restarts
      - openclaw-data:/root/.openclaw/data
      # Project workspace (read-write so the agent can read/write code)
      - .:/workspace
    working_dir: /workspace
    environment:
      OPENCLAW_API_BASE: http://coding-agency:8000/v1
      OPENCLAW_MODEL:    coding-agency
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  openclaw-data:
