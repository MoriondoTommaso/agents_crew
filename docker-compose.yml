# docker-compose.yml
# Claude Code coding agent stack
#
#   litellm   — Anthropic→OpenAI proxy, routes frontier/local (port 4000)
#   neo4j     — Graph database for Graphiti memory (ports 7474 7687)
#   memory    — Graphiti knowledge-graph MCP service (port 8002)
#
# Claude Code CLI runs on the HOST (Mac), not in Docker.
# It connects to LiteLLM via ANTHROPIC_BASE_URL=http://localhost:4000
# and to memory via MCP at http://localhost:8002
#
# Prerequisites (host machine):
#   ollama serve                  # Ollama on port 11434
#   ollama pull nomic-embed-text  # embedding model (~274MB)
#   ollama pull qwen2.5:1.5b      # entity extraction model
#   ollama pull qwen2.5-coder:14b # code generation model
#
# Usage:
#   make up        → start all 3 services
#   make bootstrap → seed knowledge graph from codebase (run once)
#   make claude    → launch Claude Code in current directory
#   make logs      → follow all logs
#   make down      → stop everything

services:

  # ── 1. LiteLLM proxy ──────────────────────────────────────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml:ro
    env_file:
      - .env
    environment:
      FREELLM_BASE_URL: ${FREELLM_BASE_URL:-http://host.docker.internal:3001/v1}
      FREELLMAPI_KEY:   ${FREELLMAPI_KEY:-none}
      OLLAMA_BASE_URL:  ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-sk-local}
    command: ["--config", "/app/config.yaml", "--port", "4000", "--detailed_debug"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── 2. Neo4j graph database ────────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    # Neo4j 5.x: healthcheck via HTTP API (porta 7474) — non usa cypher-shell
    # che può non essere nel PATH o fallire prima che il DB sia pronto.
    # start_period alto perché al primo avvio scarica il plugin APOC.
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── 3. Graphiti Memory MCP service ────────────────────────────────────────
  memory:
    build:
      context: ./memory
      dockerfile: Dockerfile
    image: memory-mcp:latest
    container_name: memory
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      NEO4J_URI:             bolt://neo4j:7687
      NEO4J_USER:            neo4j
      NEO4J_PASSWORD:        ${NEO4J_PASSWORD:-changeme}
      OLLAMA_BASE_URL:       ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GRAPHITI_EMBED_MODEL:  ${GRAPHITI_EMBED_MODEL:-nomic-embed-text}
      GRAPHITI_LLM_MODEL:    ${GRAPHITI_LLM_MODEL:-qwen2.5:1.5b}
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  neo4j-data:
  neo4j-logs:
