# docker-compose.yml
# Coding agent stack
#
#   neo4j    — Graph database for Graphiti memory (ports 7474 7687)
#   memory   — Graphiti knowledge-graph MCP service (port 8002)
#   litellm  — OpenAI-compatible proxy bridging gpt-4.1-nano to Ollama (port 4000)
#
# LLM routing is handled by the LiteLLM proxy (Docker) or FreeLLMAPI (HOST).
# OpenCode CLI runs on the HOST and speaks OpenAI format to the LLM endpoint.
#
# Usage:
#   make up        → start neo4j + memory + litellm
#   make bootstrap → seed knowledge graph (run once)
#   make opencode  → launch OpenCode agent
#   make freellm   → start FreeLLMAPI server (if using FreeLLMAPI)
#   make logs      → follow all logs
#   make down      → stop everything

services:

  # ── 1. Neo4j graph database ────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── 2. Graphiti Memory MCP service ──────────────────────────────────────
  memory:
    build:
      context: ./memory
      dockerfile: Dockerfile
    image: memory-mcp:latest
    container_name: memory
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      # Neo4j — always internal
      NEO4J_URI:                    bolt://neo4j:7687
      NEO4J_USER:                   neo4j
      NEO4J_PASSWORD:               ${NEO4J_PASSWORD:-changeme}

      # LLM for entity extraction — reaches host via host.docker.internal
      FREELLM_BASE_URL:             ${FREELLM_BASE_URL:-http://host.docker.internal:3001/v1}
      FREELLM_API_KEY:              ${FREELLM_API_KEY:-freellm}
      GRAPHITI_LLM_MODEL:           ${GRAPHITI_LLM_MODEL:-auto}

      # Embeddings — Mode A (Ollama local) or Mode B (cloud)
      # Set GRAPHITI_EMBED_PROVIDER=openai in .env to disable Ollama requirement.
      GRAPHITI_EMBED_PROVIDER:      ${GRAPHITI_EMBED_PROVIDER:-ollama}
      GRAPHITI_EMBED_MODEL:         ${GRAPHITI_EMBED_MODEL:-nomic-embed-text}
      GRAPHITI_EMBED_DIM:           ${GRAPHITI_EMBED_DIM:-768}
      # Mode A: Ollama (default)
      OLLAMA_BASE_URL:              ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      # Mode B: cloud endpoint — only used when GRAPHITI_EMBED_PROVIDER != ollama
      GRAPHITI_EMBED_BASE_URL:      ${GRAPHITI_EMBED_BASE_URL:-}
      GRAPHITI_EMBED_API_KEY:       ${GRAPHITI_EMBED_API_KEY:-}

      # Graph namespace
      GRAPHITI_GROUP_ID:            ${GRAPHITI_GROUP_ID:-agents}

      # Bootstrap tuning
      BOOTSTRAP_TIMEOUT:            ${BOOTSTRAP_TIMEOUT:-600}
      BOOTSTRAP_EPISODE_DELAY:      ${BOOTSTRAP_EPISODE_DELAY:-0}

    volumes:
      # Mount the repo root so bootstrap.py can scan all source files
      - .:/workspace:ro
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/sse', timeout=5).read(1)"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── 3. LiteLLM proxy (bridges gpt-4.1-nano → Ollama) ──────────────────────
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  neo4j-data:
  neo4j-logs:
