# docker-compose.yml
# Coding agent stack — FreeLLMAPI + OpenCode edition
#
#   neo4j   — Graph database for Graphiti memory (ports 7474 7687)
#   memory  — Graphiti knowledge-graph MCP service (port 8002)
#
# LLM routing is handled by FreeLLMAPI running on the HOST (not Docker).
# OpenCode CLI runs on the HOST and speaks OpenAI format to FreeLLMAPI.
#
# Prerequisites (host machine):
#   cd ../freellmapi && npm run dev   # FreeLLMAPI on :3001
#   ollama serve                      # Ollama on :11434
#   ollama pull nomic-embed-text
#   ollama pull qwen2.5:1.5b
#
# Usage:
#   make up        → start neo4j + memory
#   make bootstrap → seed knowledge graph (run once)
#   make opencode  → launch OpenCode agent
#   make freellm   → start FreeLLMAPI server
#   make logs      → follow all logs
#   make down      → stop everything

services:

  # ── 1. Neo4j graph database ──────────────────────────────────────────────
  neo4j:
    image: neo4j:5.26-community
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-changeme}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ── 2. Graphiti Memory MCP service ───────────────────────────────────────
  memory:
    build:
      context: ./memory
      dockerfile: Dockerfile
    image: memory-mcp:latest
    container_name: memory
    restart: unless-stopped
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      NEO4J_URI:            bolt://neo4j:7687
      NEO4J_USER:           neo4j
      NEO4J_PASSWORD:       ${NEO4J_PASSWORD:-changeme}
      OLLAMA_BASE_URL:      ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GRAPHITI_EMBED_MODEL: ${GRAPHITI_EMBED_MODEL:-nomic-embed-text}
      GRAPHITI_LLM_MODEL:   ${GRAPHITI_LLM_MODEL:-qwen2.5:1.5b}
    depends_on:
      neo4j:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8002/health"]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  neo4j-data:
  neo4j-logs:
